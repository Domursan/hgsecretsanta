<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistance — Père Noël Secret</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/assistance.css" />
</head>
<body>

  <div id="navbar-container"></div>

  <main class="main-content">
    <h1 class="page-title">🆘 Assistance</h1>

    <div class="card form-card animate-in">
      <h2>Une question ? Un problème ? 🤔</h2>
      <p class="subtitle">Envoie une demande et l'équipe organisatrice te répondra dès que possible.</p>

      <div id="alert-container"></div>

      <form id="assistance-form" action="https://formspree.io/f/mzdjvede" method="POST" novalidate>

        <div class="form-group">
          <label for="email-assist">Ton adresse email *</label>
          <input type="email" id="email-assist" name="email" placeholder="ton@email.com" required />
        </div>

        <div class="form-group">
          <label>Catégorie de ta demande *</label>
          <div class="categorie-grid">
            <div class="categorie-option"><input type="radio" name="categorie" id="cat1" value="inscription"><label for="cat1"><span class="cat-emoji">📝</span>Inscription</label></div>
            <div class="categorie-option"><input type="radio" name="categorie" id="cat2" value="attribution"><label for="cat2"><span class="cat-emoji">🎁</span>Attribution</label></div>
            <div class="categorie-option"><input type="radio" name="categorie" id="cat3" value="idee-cadeau"><label for="cat3"><span class="cat-emoji">💡</span>Idée cadeau</label></div>
            <div class="categorie-option"><input type="radio" name="categorie" id="cat4" value="date-lieu"><label for="cat4"><span class="cat-emoji">📅</span>Date / Lieu</label></div>
            <div class="categorie-option"><input type="radio" name="categorie" id="cat5" value="technique"><label for="cat5"><span class="cat-emoji">🛠️</span>Problème technique</label></div>
            <div class="categorie-option"><input type="radio" name="categorie" id="cat6" value="autre"><label for="cat6"><span class="cat-emoji">💬</span>Autre</label></div>
          </div>
        </div>

        <div class="form-group">
          <label for="sujet">Sujet *</label>
          <input type="text" id="sujet" name="sujet" placeholder="Résume ta demande en quelques mots" required />
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" name="message" maxlength="1000"
            placeholder="Décris ta demande en détail..." required></textarea>
        </div>

        <div class="submit-area">
          <button type="submit" class="btn btn-primary" id="submit-btn" data-original-text="🆘 Envoyer ma demande">
            🆘 Envoyer ma demande
          </button>
          <span class="text-muted" style="font-size:0.82rem;">* Champs obligatoires</span>
        </div>

      </form>
    </div>


  </main>

  <div id="footer-container"></div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('assistance-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');

      const email     = document.getElementById('email-assist').value.trim();
      const categorie = document.querySelector('input[name="categorie"]:checked')?.value;
      const sujet     = document.getElementById('sujet').value.trim();
      const message   = document.getElementById('message').value.trim();

      if (!email || !categorie || !sujet || !message) {
        showAlert('alert-container', 'Merci de remplir tous les champs obligatoires.', 'error');
        return;
      }

      setLoading(btn, true);

      try {
        const formData = new FormData(e.target);
        const res = await fetch(e.target.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (res.ok) {
          showAlert('alert-container', 'Ta demande a bien été envoyée ! On te répond très vite 🎅', 'success');
          document.getElementById('assistance-form').reset();
        } else {
          showAlert('alert-container', 'Une erreur est survenue. Réessaie.', 'error');
        }
      } catch(err) {
        showAlert('alert-container', 'Impossible de contacter le serveur. Réessaie plus tard.', 'error');
      } finally {
        setLoading(btn, false, '🆘 Envoyer ma demande');
      }
    });
  </script>

</body>
</html>
